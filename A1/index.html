<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu UI</title>

    <link rel="stylesheet" href="style.css">

    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>

<div class="container">

    <div class="left">

        <img src="images/logo.png" class="logo">

        <div class="content">
            <h4>POKEMON GEN I</h4>

            <h1>Pikachu</h1>

            <p>
                Pikachu is an Electric-type Pokémon introduced
                in Generation I. Pikachu are small, chubby,
                and incredibly cute mouse-like Pokémon.
                They are almost completely covered by
                yellow fur.
            </p>

            <div class="number">
                <span class="line"></span>
                <h3>01 / 08</h3>
            </div>
        </div>

        <div class="pokeball"></div>

    </div>

    <div class="right">

        <i class="ri-menu-3-line menu"></i>

        <img src="images/pikachu.png" class="pikachu">

        <div class="dots">
            <span class="active"></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

    </div>

</div>

</body>
</html>
